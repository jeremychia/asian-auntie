<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Asian Auntie">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <title>{% block title %}Asian Auntie{% endblock %}</title>
</head>
<body>

  {% if current_user.is_authenticated %}
  <header class="site-header">
    <div class="nav-inner">
      <a href="{{ url_for('perishables.dashboard') }}" class="nav-brand">Asian Auntie</a>
      <div class="nav-end">
        <a href="{{ url_for('perishables.add_item') }}" class="nav-link nav-link--primary">+ Add item</a>
        <form method="post" action="{{ url_for('auth.logout') }}" style="margin:0">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="nav-logout">Log out</button>
        </form>
      </div>
    </div>
  </header>
  {% endif %}

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="content" style="padding-bottom:0">
          {% for category, message in messages %}
            <div role="alert" class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

</body>
</html>
