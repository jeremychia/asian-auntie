# MVP Launch Checklist

mvp_scope:
  description: "Minimum viable product for the Manage Perishables app"
  target_date: null
  status: "in_progress"

acceptance_criteria:
  - criterion: "Users can add items — photo optional, name + expiry required"
    status: null
    flows: ["ADD_INDIVIDUAL_ITEM"]
    notes: "Camera opens by default; skip is one tap. Text-only cards are a first-class design."

  - criterion: "Users can bulk-add items from a receipt photo"
    status: null
    flows: ["ADD_FROM_RECEIPT"]
    notes: "OCR extracts names; shelf-life estimates pre-fill expiry; user always reviews before saving"

  - criterion: "Dashboard shows all items with urgency (color + text label) sorted by expiry"
    status: null
    flows: ["VIEW_DASHBOARD"]
    notes: "Urgency = color + text (TODAY / N DAYS). Search bar always visible. Both photo and text cards."

  - criterion: "Users receive actionable notifications aligned to their cooking days"
    status: null
    flows: []
    notes: "Onboarding: ask cooking days. Notify evening before nearest cooking day. Max 2 per day."

  - criterion: "Users can mark items as used (2-tap removal)"
    status: null
    flows: ["MARK_AS_USED"]
    notes: "Confirm → Yes → toast with 5s undo. No partial consumption tracking in MVP."

  - criterion: "Users can remove items from pantry with minimal friction"
    status: null
    flows: ["REMOVE_ITEM"]
    notes: "Two-option confirmation (discarded / don't want it) — no extra reason text input."

  - criterion: "Data persists locally"
    status: null
    notes: "SQLite or Realm. No cloud sync required for MVP."

excluded_from_mvp:
  - "Consumption tracking / progress bars (v2)"
  - "Household sharing (v2+)"
  - "Recipe integration (separate feature)"
  - "Analytics / waste insights (v2)"
  - "Web dashboard (v2+)"
  - "Supermarket integration (v2+)"
  - "Barcode scanning (v2)"
  - "Trade perishables integration (only after trade feature reaches critical mass)"
  - "Cross-device sync (v2)"

core_flows_for_mvp:
  - "ADD_INDIVIDUAL_ITEM"
  - "ADD_FROM_RECEIPT"
  - "VIEW_DASHBOARD"
  - "MARK_AS_USED"
  - "REMOVE_ITEM"

notes: |
  - Items are binary in MVP: in inventory or removed. No partial consumption state.
  - Notification system requires platform push (APNs for iOS, FCM for Android) — decide early.
  - Fuzzy autocomplete list (~100 Asian pantry items) must be built before launch.
  - Shelf-life estimate database (for receipt flow) must cover at least the top 50 item types.
  - Text-only card design must be signed off as intentional before development starts.
