# Manage Perishables: User Flows

flows:
  ADD_INDIVIDUAL_ITEM:
    name: Add Individual Item
    goal: Add an item to inventory with minimal friction — ideally completable in under 15 seconds
    happy_path:
      - User taps "+" button
      - System opens camera immediately (no intermediate screen)
      - User snaps photo of item (or selects from gallery) — can add multiple photos (e.g., item appearance, label)
      - After each photo, system shows thumbnail strip and "Add another photo" option alongside "Done"
      - System sends all photos to image recognition API (checks cache first):
          - Returns: item name, item type, estimated shelf life
          - If multiple photos, system uses the highest-confidence result
      - Regardless of confidence: system shows a brief confirmation card ("Fish sauce — expires June 2026")
        with a single "Looks good ✓" button and an "Edit" link — never auto-saves without user seeing result
      - If confidence ≥85%: card pre-filled, user confirms with one tap
      - If confidence 60–85%: card pre-filled, expiry date field highlighted for quick review
      - If confidence <60%: card shown with empty name + expiry fields, user fills in
      - User confirms → item saved → dashboard updates
      - Photos are optional: user can skip camera entirely and go straight to the name+expiry form
    fallback_path:
      - If image recognition fails or user skips photos
      - System shows minimal form: Item name (required), Expiry date (required), photos optional
      - Item name uses fuzzy autocomplete from known Asian pantry items (top ~100 items)
      - Date picker defaults based on detected item type (per MANAGE-002):
          - Produce / fresh herbs: +5 days
          - Dairy / tofu: +7 days
          - Opened sauces / condiments: +6 months
          - Unopened pantry items (sauces, oils, dried): +12 months
          - Unknown type: +3 months (neutral default)
      - User taps "Save" → item saved → dashboard updates
    decision_points:
      - Confidence ≥85%: one-tap confirm (pre-filled card)
      - Confidence 60–85%: pre-filled card, expiry field highlighted for verification
      - Confidence <60%: empty form (name + expiry required)
      - Item without photos: text-only card on dashboard (styled deliberately, not a broken photo card)
      - Multiple photos provided: system picks the best visual photo for the dashboard card (prefer appearance over label)
      - Date picker: never default to today (too easy to accidentally save wrong date)
      - Validate expiry date: must be within 2 years from today; warn if >18 months (unusual)
      - Validate expiry date: if date is in the past, block save with "That date has already passed"
    edge_cases:
      - Recognition returns wrong item: user taps "Edit" on confirmation card before saving
      - One photo is blurry/unclear but another is usable: system uses the usable one silently
      - All photos are blurry/unclear: system shows "Hard to read — try again or enter manually"
      - User skips photos entirely: go directly to fallback form — not penalised, no reminder
      - User adds redundant photos (e.g., same angle twice): deduplicate silently, show one result
      - User navigates away mid-capture: discard (no draft save)
      - Duplicate item names: allow (user might have multiple jars of same item)
      - Cache hit (e.g., "soy sauce"): use cached recognition, instant confirm card
      - International product unrecognised: fall to fallback form, name autocomplete helps
    data_collected:
      - Item name (required)
      - Expiry date (required, ISO format)
      - Photos (optional, JPEG, up to N per item)
      - Item type (auto-detected: sauce, oil, spice, condiment, produce, dried, tofu, seafood, dairy, other, unknown)
      - Recognition confidence score (for debugging/quality monitoring)
      - Timestamp added
      - Cache hit flag
      - Has photo flag (for monitoring photo adoption rate)
      - Photo count per item
      - Photo types present (appearance, label, other)
    open_questions:
      - Which image recognition API? (Google Vision, OpenAI Vision, custom?)
      - What is the max number of photos per item? (cap needed for storage)
      - Should autocomplete list be curated manually or seeded from recognition logs?
      - Should we log low-confidence recognitions for future model improvement?

  ADD_FROM_RECEIPT:
    name: Add Items from Receipt
    goal: Bulk add item names from a receipt — user fills in expiry dates in one pass
    design_constraint: |
      Receipts contain: item names, quantities, prices, purchase date.
      Receipts almost never contain expiry dates.
      This flow handles item discovery (what did I buy?) — expiry dates are always a separate step.
      Do not suggest the system can infer expiry dates from OCR alone.
    happy_path:
      - User taps "Add from receipt"
      - System opens camera immediately
      - User photographs receipt
      - System runs OCR, extracts item names and quantities
      - System displays parsed list: each row shows item name + quantity
      - System applies item type detection per name (e.g., "Fish Sauce 700ml" → sauce type)
      - System pre-fills a shelf-life estimate per item type as a suggested expiry date
        (e.g., "Soy sauce → ~12 months", "Baby bok choy → ~5 days")
      - User reviews list: each item has name (editable), expiry date (editable, pre-filled with estimate)
      - Items with low-confidence shelf-life estimates are highlighted for user attention
      - User edits any dates that look wrong, deletes items not relevant (non-food line items)
      - User taps "Add all" → items saved → dashboard updates
      - Toast: "Added 8 items — tap to review"
    fallback_path:
      - If OCR fails or receipt image is unclear
      - System shows empty list with "+" button to add items manually one by one
      - User enters items manually using the same name + expiry form as ADD_INDIVIDUAL_ITEM
    design_notes:
      - Shelf-life estimates are explicitly labelled "estimate" — not presented as fact
      - The review screen is the primary interaction; OCR just pre-populates it to save typing
      - User always sees and confirms every item before saving — no bulk silent save
      - If user skips editing a pre-filled estimate: that's fine, they made the choice to accept it
    decision_points:
      - OCR confidence high: populate list, user reviews
      - OCR confidence low: show partial list with flag "Some items may be missing"
      - Item type identified: show shelf-life estimate with confidence label ("~12 months for sauces")
      - Item type unknown: expiry field left blank, required before saving that row
      - If item already in inventory: show subtle "Already in pantry" note, allow duplicate
    edge_cases:
      - Receipt image blurry: "Hard to read — try again, or add items manually"
      - OCR parses non-food line items (bags, packaging): user deletes these in review screen
      - User uploads non-receipt image: "This doesn't look like a receipt. Try again."
      - Receipt is very long (20+ items): show all in scrollable review list, no truncation
      - User cancels mid-review: discard all (no draft)
    data_collected:
      - Receipt photo (JPEG)
      - OCR confidence score
      - Parsed item list (name, quantity if visible)
      - User edits to parsed items (what was changed from OCR output)
      - Final items added with expiry dates and whether date was user-set or estimate-accepted
      - Purchase date from receipt if parseable
    open_questions:
      - Which OCR API? (Google Cloud Vision, AWS Textract)
      - Shelf-life estimate database: build manually for top 100 Asian pantry items, or use an API?
      - Should we store receipt metadata (store name, total) for future analytics?

  VIEW_DASHBOARD:
    name: View Dashboard
    goal: Instantly see what needs to be used and find any item quickly
    happy_path:
      - User opens app
      - System loads inventory sorted by expiry date (most urgent first)
      - Items displayed as cards in a 2-column grid
      - Cards with photos: full-bleed food photo with urgency label + expiry text overlaid at bottom
      - Cards without photos: solid background (item-type color or neutral) with item name + expiry text centered
        — deliberately styled, not a broken placeholder
      - Urgency communicated by BOTH color AND text label (never color alone):
        - "TODAY" label + red background/overlay
        - "2 DAYS" / "3 DAYS" label + orange background/overlay
        - Expiry date shown as text for items 4+ days out (no urgency color)
      - Search bar pinned at top — always visible, searches by item name
      - User can tap "Sort" to change order: Expiry (default), Recently added, Alphabetical
      - User taps any card to see detail
    decision_points:
      - 0 items: empty state with large "Add your first item" CTA
      - 1–20 items: full grid, no pagination
      - 20+ items: search bar becomes critical path — ensure it's prominent
      - Item expires today: "TODAY" badge, appears at very top regardless of sort
      - Sort preference persists across sessions
    edge_cases:
      - User has 50+ items: search handles discovery; sort handles priority
      - Live update: item added from another screen updates dashboard on return (no manual refresh)
      - All items expired: show warning state "Everything here has expired" with bulk-remove option
    data_collected:
      - Sort mode selected
      - Search queries (for understanding how users look for items)
      - Count of items by urgency tier at session open
    open_questions:
      - Should the summary line ("3 expiring soon") appear at top of dashboard?
      - Should sort preference sync across devices or stay local?

  MARK_AS_USED:
    name: Mark Item as Used
    goal: Remove a finished item from inventory with minimum taps
    scope_note: |
      Consumption tracking (partial use progress bar) is deferred to v2.
      MVP: items are either in inventory or removed. No partial state.
      This keeps the add→use loop fast and the dashboard unambiguous.
    happy_path:
      - User views item detail
      - User taps "Mark as Used"
      - System shows brief confirmation: "Done with [item name]?" with Yes / Not yet
      - User taps Yes
      - Item removed from inventory, toast shown: "Removed [item name]" with Undo (5s)
      - Returns to dashboard
    edge_cases:
      - User taps Undo within 5 seconds: item restored to inventory, removal cancelled
      - User marks item as used via swipe on dashboard card (shortcut): same confirmation + undo
      - Item had already expired: removal proceeds normally, no extra warning needed
    data_collected:
      - Item ID
      - Removal timestamp
      - Intent: used (vs. discarded — see REMOVE_ITEM)
    deferred_to_v2:
      - Partial consumption tracking (progress bar, slider, "About half" buttons)
      - Consumption history per item
      - "This expires today but you still have some left" partial-use warning

  REMOVE_ITEM:
    name: Remove Item from Pantry
    goal: Remove an unwanted or expired item quickly — distinct from "used it" (see MARK_AS_USED)
    design_note: |
      REMOVE_ITEM is for items not consumed: expired and discarded, no longer wanted, gifted away.
      MARK_AS_USED is for items that were eaten/used up.
      These are two separate intents and are logged separately for future waste analytics.
    happy_path:
      - User views item detail page (or long-presses card on dashboard)
      - User taps "Remove from Pantry"
      - System shows confirmation: "Remove [item name]?" with two options:
        - "Threw it away" (maps to reason: discarded)
        - "Don't want it" (maps to reason: unwanted)
      - User selects one
      - Item removed, toast: "Removed [item name]" with Undo (5s)
      - Returns to dashboard
    design_rationale: |
      Reason selection is kept to two clear options, presented as the confirmation itself — not a
      separate step after confirmation. This avoids the pattern of "confirm → then also pick reason."
      "Other" text field removed: too much friction for analytics value. The two options cover 90%+
      of removal intent. Reason is inferred from item state where possible (expired item → discarded).
    decision_points:
      - Item is expired: pre-select "Threw it away" but allow override
      - Item is not yet expired: pre-select "Don't want it"
      - Reason logged automatically; no text input required
    edge_cases:
      - User undoes within 5 seconds: item fully restored, removal log entry reversed
      - User accidentally removes multiple items: undo works per-item (most recent first)
      - Item was "Used it all" → user should use MARK_AS_USED flow, not this one
    data_collected:
      - Item ID
      - Item name
      - Item type
      - Removal timestamp
      - Removal reason (discarded, unwanted)
      - Days overdue at removal (if expired: removal_date minus expiry_date)
      - Item expiry date
    deferred_to_v2:
      - "Want to list this for trade?" prompt on removing unopened items
      - Removal pattern analytics ("You tend to discard cilantro within 3 days")
      - Export removal history
