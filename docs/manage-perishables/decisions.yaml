# Manage Perishables: Decisions
# Status: pending (to be locked), locked, shipped

MANAGE-001:
  title: Photo requirement
  status: locked
  decision: Optional — camera opens by default, but skip is always one tap away
  rationale: |
    Photos are the fastest path to recognition and the richest visual in the dashboard.
    But requiring photos creates friction at the worst moment (unpacking groceries).
    Making photos optional, with a well-designed text-only card fallback, means:
    - Users who take photos get a richer dashboard and faster add (recognition pre-fills)
    - Users who skip photos still have a fully functional item card
    The text-only card must be deliberately styled — not a broken image placeholder.
    It uses item-type color coding or a neutral background with prominent name + expiry text.
  mitigations:
    - Camera opens by default on tapping "+" — taking a photo is the path of least resistance
    - "Skip photo" option is clearly available but not prominent
    - No shame messaging, no nudge to add photos later
    - Dashboard text cards look intentional, not degraded

MANAGE-002:
  title: Expiry date input
  status: locked
  decision: Date picker with smart defaults — never defaults to today
  rationale: |
    Free text is faster but introduces parsing failures and garbage data silently.
    Date picker guarantees valid ISO dates, which is worth the minor friction.
    The key insight: the default value matters more than the input method.
    Default to today = high error rate (user taps Save without changing it).
    Default to +shelf-life estimate = fast for typical cases, user adjusts when wrong.
    Smart defaults by item type:
      - Produce / fresh herbs: +5 days
      - Dairy / tofu: +7 days
      - Opened sauces / condiments: +6 months
      - Unopened pantry items (sauces, oils, dried): +12 months
      - Unknown type: +3 months (neutral)
    Items from recognition: if a printed date is detected in the photo, use it directly
    and label it "Printed date" so user knows it's exact, not estimated.
    Items without printed dates: use shelf-life default, label as "Estimated".
  mitigations:
    - Validate: date must be today or in future (block past dates)
    - Validate: date must be within 2 years (warn if >18 months — unusual)
    - "Estimated" label on pre-filled dates signals the user should verify
    - User can always scroll the date picker to override

MANAGE-003:
  title: Notification window
  status: locked
  decision: Notify before the nearest upcoming cooking day — not a fixed X-days window
  rationale: |
    A 3-day blanket window assumes the user cooks every 2-3 days. If Jeremy cooks weekends
    only, a Wednesday notification is accurate but unactionable — he can't use the item until
    Saturday. An unactionable notification is worse than no notification (creates guilt, not action).
    Better model: ask once at onboarding "What days do you usually cook?" (e.g., Fri/Sat/Sun).
    Then: notify the evening before the nearest cooking day where the item will expire before
    the *following* cooking day.
    Example: item expires Thursday, user cooks Sat/Sun → notify Wednesday evening
    ("Fish sauce expires tomorrow — use it this weekend?")
    This makes every notification actionable.
  mitigations:
    - Onboarding question is optional — if skipped, fall back to 3-day window
    - User can change cooking days in settings at any time
    - Snooze option: "Remind me tomorrow" (pushes 24h, not indefinitely)
    - Never more than 2 notifications per day regardless of how many items expire
    - Frame as "use it" not "it's expiring" — actionable language
  notification_schedule:
    - T-1 cooking day: primary notification (most useful)
    - Day of expiry: fallback if item still in inventory (brief, not guilt-inducing)
    - No notification after expiry — item just sits at top of dashboard as red

MANAGE-004:
  title: Item names
  status: locked
  decision: Free text with fuzzy autocomplete from a curated Asian pantry list (~100 items)
  rationale: |
    Pure free text leads to "tamarind", "tamarind paste", "TPaste" — search becomes unreliable.
    Full autocomplete-only is too restrictive for the long tail of Asian pantry items.
    Fuzzy autocomplete threads the needle: fast for common items, always overridable.
    Curated list starts at ~100 items covering the most common Southeast/East Asian pantry staples.
    Search uses fuzzy matching so "tamarind" finds "tamarind paste" — no exact match required.
  mitigations:
    - Autocomplete fires after 2 characters
    - "Not in the list? Just type it" — free text always accepted
    - Top suggestion pre-selected, one tap to accept
    - List maintained manually; seed from recognition logs over time
    - Item names are user-editable post-save on item detail page

MANAGE-005:
  title: MVP scope
  status: pending
  decision: Single-user, offline-first
  rationale: |
    Question: "What if users share a household but log independently?"
    Single-user simplest path to launch. But unintended consequence:
    If household members use app, they might duplicate items or conflict on "used" actions.
    Example: You mark milk as used, partner marks same milk again → confusing.
    Offline-first adds complexity (data conflicts: add item offline, edit same item online).
  mitigations:
    - Start single-user, test household behavior first
    - If household becomes priority later, redesign for ownership/sharing
    - Offline sync must have conflict resolution (last-write-wins, or flag for user)
  blockers: |
    Build for household sharing now, or refactor later?
    Does offline-first actually add value, or just complexity?

MANAGE-006:
  title: Consumption tracking for gradual-use items
  status: locked
  decision: Deferred to v2 — not in MVP
  rationale: |
    Consumption tracking (progress bars, sliders, "About half" buttons) requires ongoing user input
    with no direct payoff in the core MVP use case (expiry reminders).
    Tracking "you've used 35% of soy sauce" doesn't change its expiry date or improve notifications.
    For MVP, items are binary: in inventory or removed. This keeps MARK_AS_USED fast (two taps).
    In v2, when recipe recommendations need accurate quantities, consumption tracking adds real value.
    Until then, it adds friction without meaningful benefit.
  v2_design_notes: |
    When implemented in v2:
    - Progress bar visible on item card and detail page
    - Update consumption via quick buttons (25% / 50% / 75% / 100%) — not a slider
    - "Just a bit" language removed in favour of explicit percentages (less ambiguous)
    - Reaching 100% → triggers MARK_AS_USED confirmation
    - Expired + partially consumed: show "Still have some left?" prompt, user decides

MANAGE-007:
  title: Dashboard visual design — minimalist modern approach
  status: locked
  decision: |
    2-column card grid. Two card variants, both first-class:
    (A) Photo card: full-bleed food photo, dark gradient scrim at bottom, item name + expiry text overlaid
    (B) Text card: solid background (item-type accent color or neutral gray), item name + expiry text centered
    Both variants have identical dimensions and corner radius — no visual hierarchy between them.
    Text card is not a placeholder or fallback state — it is a deliberate design choice.
    Urgency overlay (see MANAGE-008) applies identically to both card types.
    Subtle rounded corners (12px), tight grid spacing, no drop shadows (flat design).
  rationale: |
    Photos are optional. If the dashboard treats text cards as broken photo cards (gray placeholder,
    missing-image icon), users without photos feel penalised. A deliberate text card design means
    the experience is equally good regardless of photo presence.
    Item-type accent colors on text cards (e.g., green for produce, amber for sauces) give visual
    variety without requiring photos.
  mitigations:
    - Dark gradient scrim on photo cards ensures WCAG AA text contrast regardless of photo content
    - Text cards use high-contrast text on muted background
    - Both card types tested with actual content before ship

MANAGE-008:
  title: Dashboard urgency color system
  status: locked
  decision: |
    Three-tier urgency system using BOTH color AND text label — never color alone:
    🔴 "TODAY" — red background/overlay + "TODAY" text label
    🟠 "2 DAYS" / "3 DAYS" — orange background/overlay + exact day count
    Default — no urgency color, expiry date shown as plain text (e.g., "Jun 14")
    Text label sits in the card's bottom bar alongside item name.
    Color enhances; text communicates. System works identically for color-blind users.
  rationale: |
    Red/orange are in the same range that ~8% of males cannot distinguish (red-green color blindness).
    Relying on color alone as the primary urgency signal fails for a meaningful user segment.
    Color + explicit text label makes the system redundant in the right way: color for fast
    visual scanning, text for reliability. This is how iOS system alerts, warning banners, and
    health apps handle critical information.
  mitigations:
    - "TODAY" and day-count labels are always present regardless of color rendering
    - Test with color blindness simulation tools (Sim Daltonism, Figma plugins)
    - Text color on red/orange backgrounds must pass WCAG AA (white text on these colors passes)

MANAGE-009:
  title: Dashboard sort/filter functionality
  status: locked
  decision: |
    Search bar always visible at top of dashboard (primary discovery mechanism for large inventories).
    Sort button (top-right) opens a minimal menu with three options only:
    - Expiry date (default, most urgent first)
    - Recently added (newest first)
    - Alphabetical (A-Z)
    Sort preference persists across sessions.
    "By consumption progress" and "By item type" removed from MVP — too complex, low usage expected.
  rationale: |
    With 50+ items, search is the primary way to find things — not sort. Sort is for browsing.
    Three sort options cover the real use cases without overwhelming. The fourth (consumption
    progress) depends on v2 consumption tracking, so it's removed for now.
    Persisting sort preference removes one tap per session for users who don't use the default.
  mitigations:
    - Search uses fuzzy matching: "soy" finds "dark soy sauce", "soy sauce", "soybean paste"
    - Search searches item name only (not type, not notes) for simplicity
    - Sort preference syncs locally; cross-device sync deferred to v2

MANAGE-010:
  title: Photo compression and size limits
  status: locked
  decision: |
    Compress all uploaded photos to JPEG format with 85% quality by default.
    Enforce a strict 100KB file size limit per image by reducing quality to minimum 50% if needed.
    This applies to all photo uploads: camera capture on add-item screen and manual photo uploads.
  rationale: |
    High-resolution phone photos are often 3-10MB uncompressed, consuming excessive storage and bandwidth.
    Item recognition doesn't require high resolution — it only needs enough clarity to identify the product
    and read any printed dates. 85% JPEG quality is imperceptible to the human eye but reduces file size
    by 70-90% compared to original PNG/HEIC formats.
    100KB hard limit ensures consistent storage costs and fast upload/load times across all users and network conditions.
    Phones on slow networks (3G, rural areas) benefit from faster uploads. Users on metered connections
    benefit from lower data usage.
    This is transparent to the user — they upload normally, the backend handles compression silently.
  mitigations:
    - Compression is lossless for recognition purposes (85% quality still readable by OCR/detection models)
    - Fallback to original bytes if compression fails (prevents corrupted uploads)
    - Quality degradation is non-linear: starts at 85%, only reduces to 50% if image is very large
    - Test recognition accuracy on compressed samples before shipping

MANAGE-INTEGRATION:
  title: Ecosystem integration with other features
  status: pending
  decision: TBD - what integrations exist?
  rationale: |
    Question: "Does this enable more buying, or better cooking?"
    Auto-suggesting recipes for expiring items (via Recommend Recipe) could help use food.
    But unintended consequence: If suggestions are bad, users ignore them.
    If suggestions create noise (app keeps pestering "make cilantro salad"),
    users disable notifications entirely.
    Auto-listing to Trade Perishables could work IF Trade has network effects.
    If Trade is empty, "auto-list" feature feels useless and creates noise.
  mitigations:
    - Don't auto-suggest recipes without user opt-in
    - Only auto-list if Trade reaches critical mass
    - Let users control integrations per-feature
  blockers: |
    Will Trade Perishables have critical mass?
    Do recipe suggestions help or annoy?
