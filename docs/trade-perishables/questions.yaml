# Trade Perishables: Open Questions

# CORE VALUE PROPOSITION & INCENTIVES
Q01:
  title: Why would users give away instead of throwing away?
  status: answered
  answer: |
    Two motivations that don't require altruism:
    (1) Waste guilt — most people feel bad throwing away food they paid for. Giving it away
        feels better than binning it, even if the effort is small.
    (2) Reciprocity — in a pilot community of people who cook similarly, giving creates
        social credit. "I gave away tamarind paste last month" sets a norm of sharing.
    The key: friction must be lower than throwing away. One-tap listing from manage-perishables
    is the design goal. If listing takes longer than walking to the bin, it won't happen.

Q02:
  title: Why use this instead of Nextdoor or Facebook Groups?
  status: answered
  answer: |
    Not competing on breadth. Differentiating on:
    (1) Asian pantry specificity — a neighbor who also cooks SE Asian food is a relevant match;
        a general Nextdoor audience is not
    (2) manage-perishables integration — log item, see it expiring, give it away in one tap.
        No existing platform has this loop.
    (3) Sealed-items-only trust model — Nextdoor/Facebook have no food safety framing at all.
    The wedge is specificity and integration, not trying to replace general platforms.

Q03:
  title: Do neighbors actually want to interact this way?
  status: open
  impact: If target community doesn't want this, no amount of good design fixes it.
  proposed_resolution: |
    The pilot answers this directly. Run the pilot, measure completion rate.
    If items don't get claimed within 48 hours consistently, the desire isn't there.
    Don't assume — validate with real behavior in the pilot.

Q04:
  title: What if people give away food out of guilt (procrastination, not generosity)?
  status: answered
  answer: |
    This is fine for MVP — the outcome (someone uses the food instead of it going to waste)
    is the same regardless of the giver's motivation. "Guilt-driven giving" still reduces waste.
    The concern would be if people use listings as a way to avoid throwing things away
    without anyone actually picking them up. Auto-expiry on listings (7 days / item expiry)
    prevents stale listings building up.

Q05:
  title: Is this about food waste or community building?
  status: answered
  answer: |
    Food waste reduction is the primary goal. Community is a byproduct, not the objective.
    This matters for design decisions: don't add community features (profiles, leaderboards,
    social feeds) that distract from the core loop (list item -> someone takes it -> waste reduced).

# NETWORK EFFECTS & COLD START
Q06:
  title: How many listings are needed before the feed feels alive?
  status: answered
  answer: |
    In a hyper-local pilot: 3-5 active listings at any time is enough to feel alive.
    This is achievable with 15-20 participants who cook regularly.
    City-wide launch would need hundreds of listings — unachievable without significant user base.
    The pilot model solves this: small community, concentrated density.

Q07:
  title: What if critical mass isn't reachable in the pilot community?
  status: answered
  answer: |
    Pilot success threshold: 5+ completed give-aways. If this isn't reached in the first
    month, the feature doesn't have product-market fit in that community — try a different
    community before expanding. Don't scale a broken loop.

Q08:
  title: What if early adopters are misaligned with the product's purpose?
  status: open
  impact: If first users treat it as a junk disposal service, the feed culture is set badly.
  proposed_resolution: |
    Sealed items only hard block + photo requirement is the quality gate.
    A sealed item in original packaging cannot be "junk" in the same way old bread could be.
    Onboarding copy sets the tone: "Give away pantry staples you can't finish — sealed items only."

Q09:
  title: What happens when activity drops seasonally?
  status: open
  impact: Pilot community goes on holiday — feed empties — remaining users churn.
  proposed_resolution: |
    For the pilot this is acceptable — it's a pilot, not a live product.
    Monitor activity drops and use them to understand engagement patterns.
    Auto-expiry keeps feed clean during low-activity periods.

# TRUST & SAFETY
Q10:
  title: What if someone gets food poisoning from a traded item?
  status: open — BLOCKING
  impact: Legal liability, reputation risk, potential harm to a real person.
  proposed_resolution: |
    Sealed items only is the primary mitigation — a sealed, original-packaging item can be
    inspected by the receiver. Disclaimer is the secondary layer. No platform money changes hands.
    However: confirm with legal advice in target jurisdiction before launch.
    The legal-compliance docs should cover this specifically.
    Do not launch without legal sign-off on the sealed-items + disclaimer + no-payment model.

Q11:
  title: What if the sealed confirmation checkbox is dishonestly checked?
  status: answered
  answer: |
    The checkbox places responsibility on the giver. If someone lies about an item being sealed
    and the receiver is harmed, liability shifts to the giver who made the false declaration.
    The platform acted in good faith based on user attestation.
    Photo requirement adds a practical check — a photo of a clearly opened item would be visible.
    Receivers are advised to check packaging before accepting.

Q12:
  title: What if anonymity (display name only) reduces accountability?
  status: answered
  answer: |
    Pilot community is invite-only — members know each other as neighbors.
    Display name within a known community is sufficient accountability.
    Anonymous to the public internet, but known within the pilot. This is the right balance.

Q13:
  title: What if someone lists a contaminated item (maliciously or unknowingly)?
  status: answered
  answer: |
    Sealed items only is the main guard — contamination of a sealed item would require
    tampering, which is a criminal matter, not an app design problem.
    For unknowing contamination: sealed packaging is the receiver's inspection point.
    Report/flag mechanism allows community to surface issues quickly.

Q14:
  title: What if the photo doesn't represent the actual item condition?
  status: answered
  answer: |
    Old/misrepresentative photos are possible. Mitigations:
    (1) Photo is required at listing time (not from a stock image — user must take it)
    (2) Listing shows timestamp — receiver knows how old the listing is
    (3) Receiver is advised to verify packaging at pickup
    (4) Flag mechanism for reporting misrepresentation
    Perfect verification isn't possible. Sealed items + photo + community trust context
    is the pragmatic balance.

Q15:
  title: Can the TOS actually protect the platform legally?
  status: open — BLOCKING
  impact: Disclaimers may not hold in all jurisdictions.
  proposed_resolution: |
    Don't launch without legal review. "User assumes all risk" language is common but not
    universally enforceable. The sealed-items model is the strongest practical protection —
    confirm this with legal advice in the target jurisdiction.

# LOGISTICS & FRICTION
Q16:
  title: What if pickup logistics are too complicated?
  status: answered
  answer: |
    Pickup notes field on listing lets giver specify the arrangement ("Lobby, weekday evenings",
    "Leave at door 12B"). For a pilot within a single building or estate, logistics are simple.
    This is one reason the pilot must be hyper-local — 1km radius pickups are a different
    problem from same-building pickups. Start with same-building or same-estate.

Q17:
  title: What if people don't want to share contact information?
  status: answered
  answer: |
    They don't have to. The "I want this" model means the receiver never shares contact info.
    The giver initiates contact using their preferred channel — they control what they share.
    Receiver only sees "someone in [area] is interested."

Q18:
  title: What if pickup coordination is awkward or fails?
  status: answered
  answer: |
    For a pilot community (known neighbors), coordination failure is rare and socially recoverable.
    If giver doesn't respond: listing stays active, receiver sees "no response yet" after 48 hours.
    If pickup doesn't happen: item auto-expires. No penalty, no friction from the system's side.
    In-app messaging (v2) would improve this — but external coordination is acceptable at pilot scale.

Q19:
  title: What if items spoil before pickup (especially in hot climates)?
  status: answered
  answer: |
    Sealed items in original packaging are designed for storage — less susceptible than fresh food.
    Pickup notes can specify storage conditions ("kept in fridge, pick up within 2 days").
    This is a better problem to have than "no one uses the feature." Accept it for the pilot.

Q20:
  title: What if coordination fails (no-show, forgotten pickup)?
  status: answered
  answer: |
    No-show has low cost: giver re-lists or the item auto-expires.
    No penalty system in MVP — trust-based, community-normed.
    If no-shows become a pattern in the pilot, add a lightweight "Did this get picked up?" nudge.

# INCENTIVE MISALIGNMENT
Q21:
  title: Does give-away incentivize generosity or laziness (junk disposal)?
  status: answered
  answer: |
    Sealed items hard block is the filter. You cannot list opened or partial items.
    Someone trying to offload a half-eaten bag of flour cannot use this feature.
    The restriction makes the feature specifically for genuine give-away of useful items.

Q22:
  title: What if trading causes conflict or haggling?
  status: answered
  answer: |
    Trading (barter) is explicitly out of MVP scope. All give-aways are free.
    No negotiation, no haggling. This eliminates the conflict vector entirely for now.

Q23:
  title: What if users are one-time participants with no long-term accountability?
  status: answered
  answer: |
    Pilot community is repeat-interaction by design (same neighbors, same building).
    One-shot game theory doesn't apply when you see the same people regularly.
    This is another reason the pilot must stay hyper-local.

Q24:
  title: What if monetisation pressure destroys trust?
  status: answered
  answer: |
    No monetisation in MVP or v2 planning. Give-away is always free.
    Payment integration (for future trade/barter) is a v2+ consideration with explicit
    legal and trust design requirements. Not something to add lightly.

# ECOSYSTEM INTEGRATION
Q25:
  title: What if manage-perishables auto-lists items without user consent?
  status: answered
  answer: |
    Hard no. Give-away is always triggered by explicit user action ("Give away" button).
    No automatic listing without user review and confirmation. See TRADE-INTEGRATION.

Q26:
  title: What if household members double-list the same item?
  status: answered
  answer: |
    MVP is single-user (manage-perishables MVP scope). Household sharing is a v2 concern.
    For the pilot, one user per household is assumed.

Q27:
  title: What if the feed becomes a dumping ground for unwanted items?
  status: answered
  answer: |
    Sealed items only prevents the worst case (old opened food, near-expired opened items).
    Photo required means quality is visually inspectable.
    Auto-expiry removes stale listings. Flag mechanism handles edge cases.

# UNINTENDED CONSEQUENCES
Q29:
  title: Does this reduce food waste or just move it around?
  status: answered
  answer: |
    "Moved around" is still better than "thrown away." If the receiver uses the item, waste
    is reduced. The worst case is the receiver throws it away instead of the giver — same outcome,
    no worse. Track "marked as given" rate as a proxy for actual transfer.

Q30:
  title: What if listing friction is higher than throwing away?
  status: answered
  answer: |
    One-tap listing from manage-perishables is the design response.
    If the user is already looking at an expiring item in their dashboard, give-away is
    one extra tap. This must stay as low-friction as possible — the feature dies if it doesn't.

Q31:
  title: Does building community features create social obligation?
  status: answered
  answer: |
    Community features are explicitly deferred. MVP is a lightweight notice board.
    No social graph, no following, no leaderboard. No obligation.

core_blockers:
  - "Legal review: food gift liability in target jurisdiction before launch (Q10, Q15)"
  - "Pilot community: identify and commit 15-20 participants before building"
  - "Seed listings: primary user must have real listings ready before inviting others"
