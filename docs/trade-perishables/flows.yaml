# Trade Perishables: User Flows

# MVP scope: Give Away only, sealed/unopened items only, within a pilot community.
# Trade and Group Buy are future features — not designed here yet.

flows:
  CREATE_GIVEAWAY_LISTING:
    name: Create Give Away Listing
    goal: List a sealed item I'm giving away before it expires — in under 2 minutes
    design_constraints:
      - Sealed/unopened items only (enforced by listing form — user confirms this)
      - Photo is required — it's the primary trust signal for sealed items
      - Purchase date and expiry date both required — gives receiver the full picture
      - No partial quantities, no opened items
    primary_path:
      - User taps "Give away" (accessible from manage-perishables item detail, or standalone)
      - If item comes from manage-perishables: name, expiry date, and photo pre-filled
      - Form shows: photo (pre-filled or tap to add), item name, purchase date, expiry date,
        pickup notes (optional, e.g., "Lobby, Mon-Fri evenings")
      - Confirmation checkbox: "This item is sealed in its original packaging"
        — required before posting. Brief note: "We only accept sealed items for safety."
      - User taps "List it"
      - Listing appears in community feed
      - Toast: "Listed! You'll be notified when someone's interested."
    fallback_path:
      - User creates listing without a manage-perishables item (standalone)
      - Same form, all fields manual
      - Photo required — if no photo, cannot submit ("Add a photo so others can verify the item")
    decision_points:
      - Expiry date in the past: block listing with "This item has already expired and can't be listed"
      - Expiry date within 24 hours: warn "This expires very soon — are you sure you want to list it?"
      - Photo missing: block submission
      - Sealed checkbox unchecked: block submission
      - Listing auto-expires 7 days after posting if not claimed (or on expiry date, whichever is sooner)
    edge_cases:
      - Photo upload fails: retry prompt, cannot submit without photo
      - User tries to list an opened item: sealed checkbox is the guard — honest declaration required
      - User edits listing after posting: allowed for pickup notes only; name/dates/photo locked after publish
      - Item gets claimed while user is editing: listing marked claimed, edit discarded
    data_collected:
      - Item name
      - Purchase date
      - Expiry date
      - Photo (required, JPEG)
      - Pickup notes (optional)
      - Sealed confirmation (boolean — always true at submit; false would block)
      - Source (from manage-perishables inventory vs. standalone)
      - Created timestamp
      - Auto-expiry timestamp (min of: listing_date + 7 days, item expiry date)

  BROWSE_LISTINGS:
    name: Browse Community Listings
    goal: See what's available in my community
    design_constraints:
      - Only give-away listings exist in MVP (no type filter needed)
      - Urgency communicated by both color AND text label (same rule as manage-perishables)
      - Location shown as area/building hint only — never exact address
    happy_path:
      - User opens Trade Perishables tab
      - System shows listings from their community, sorted by expiry date (soonest first)
      - Each listing card shows: photo, item name, expiry label ("2 DAYS" / "TODAY" / date),
        building/area hint (e.g., "Block 45"), time since posted
      - Search bar at top: search by item name (fuzzy match)
      - User taps listing to see detail
    decision_points:
      - 0 listings in community: "Nothing listed yet — be the first to give something away"
      - Item expires today: "TODAY" label + red background
      - Item expires in 1-2 days: "2 DAYS" / "1 DAY" + orange background
      - Listing has been claimed: removed from feed automatically
      - Listing auto-expired: removed from feed automatically
    edge_cases:
      - User's own listing appears in feed: show "Your listing" badge, no "I want this" button
      - Listing photo fails to load: show item name + expiry on neutral background (same as manage-perishables text card)
      - Community has no other members yet: show pilot-specific empty state ("Invite a neighbor to get started")
    data_collected:
      - Listings viewed
      - Search terms used
      - Time in feed before tapping a listing
      - Scroll depth (are users seeing all listings or just the top few?)

  VIEW_LISTING_DETAIL:
    name: View Listing Detail
    goal: Decide if I want this item and express interest without sharing my contact details
    design_note: |
      Contact info is NOT revealed directly. Privacy risk is too high.
      Instead: receiver taps "I want this" -> giver gets notified -> giver chooses how to respond.
      This keeps receiver anonymous until giver engages, and gives giver control.
    happy_path:
      - User taps listing in feed
      - System shows: large photo, item name, purchase date, expiry date, sealed confirmation tick,
        pickup notes (if any), building/area (no exact address), time posted
      - Disclaimer shown once per session: "Items are shared as-is. Check packaging before accepting."
      - User taps "I want this"
      - System sends notification to giver: "Someone in [building/area] is interested in your [item name]"
      - Confirmation to receiver: "The owner has been notified. They'll reach out if available."
      - Giver decides whether to respond (via in-app message stub or external — see TRADE-002)
    decision_points:
      - Item already claimed: show "This has been claimed" — no "I want this" button
      - User is the giver: show "Your listing" view with option to mark as claimed or delete
      - Multiple people express interest: giver sees count, chooses who to give to (FIFO suggested)
    edge_cases:
      - User taps "I want this" then changes mind: no cancellation needed (giver may not have seen yet)
      - Giver doesn't respond within 48 hours: receiver sees "No response yet — item may still be available"
      - Two users tap "I want this" simultaneously: both notified to giver; giver picks one
    data_collected:
      - Listing ID viewed
      - Whether "I want this" was tapped
      - Whether disclaimer was shown (first session)
      - Time between opening detail and tapping interest

  MARK_AS_CLAIMED:
    name: Mark Item as Claimed / Remove Listing
    goal: Close the loop once item has been picked up or is no longer available
    happy_path:
      - Giver receives interest notification
      - Giver coordinates pickup (via their preferred channel)
      - After pickup, giver opens listing and taps "Mark as given"
      - System removes listing from feed, logs completion
      - Optional: "Did the pickup go smoothly?" Yes / Had an issue (free text for internal review)
    decision_points:
      - Giver wants to cancel listing (no longer available): "Remove listing" with reason
        (options: "Already gave it away elsewhere" / "Changed my mind" / "Item expired")
      - Listing auto-expires: removed silently, no action needed from giver
    edge_cases:
      - Giver marks as claimed but pickup hasn't happened yet: that's fine, trust-based system
      - Multiple interested parties: giver marks claimed after giving to one — others see "claimed" state
    data_collected:
      - Listing ID
      - Outcome (given / cancelled / auto-expired)
      - Cancellation reason (if cancelled)
      - Days between listing and claim/expiry (measures how quickly items move)
      - Whether feedback was provided (yes / issue)
