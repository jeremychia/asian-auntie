# Future Features (v2+)

future_features:
  IN_APP_MESSAGING:
    name: In-App Messaging
    priority: high
    phase: v2
    description: Replace external coordination with in-app chat between giver and receiver
    rationale: |
      MVP relies on external coordination (WhatsApp, SMS) after the giver chooses to respond.
      This works at pilot scale but creates friction: contact info must be shared externally,
      no record of coordination in the app, no nudges if communication stalls.
      In-app messaging solves all three while keeping both parties' personal contact private.
    features:
      - Simple thread per listing (giver + receiver only)
      - System message on match: "Someone wants your [item] — say hi!"
      - Notification on new message
      - Thread auto-archives after listing is marked claimed or expired
    open_questions:
      - Should message history persist after a listing closes?
      - How do we handle message abuse (moderation at scale)?
      - Should we support multiple interested parties messaging the giver simultaneously?

  TRADE_BARTER:
    name: Trade / Barter Listings
    priority: medium
    phase: v2
    description: Allow users to offer item-for-item exchanges (not just give-aways)
    rationale: |
      "I have tamarind paste, I'd love gochujang" is a natural community exchange.
      Barter is more complex than give-away (two-way logistics, value perception, coordination)
      but builds on the same trust infrastructure.
    requirements:
      - Give-away loop must be proven working before adding trade complexity
      - Both items must be sealed/unopened (same safety rules as give-away)
      - No financial component — pure item exchange
      - In-app messaging (above) should be shipped first
    open_questions:
      - How does "I want to trade for X" get expressed in a listing?
      - Should the receiver offer a specific item, or a category?
      - How do we handle asymmetric value perception ("my miso is worth more than your fish sauce")?

  GROUP_BUY:
    name: Group Buy / Split Bulk Purchases
    priority: medium
    phase: v2
    description: Coordinate before buying to split a bulk purchase among community members
    rationale: |
      Different timing to give-away: coordination happens before purchase, not after.
      Solves the "supermarket sells 1kg of tamarind but I only need 200g" problem at source.
    requirements:
      - Requires in-app messaging or coordination tool
      - No payment processing in app — participants handle split externally (e.g., PayNow)
      - Clear initiator/organiser role (who buys, who collects payment)
    open_questions:
      - How does the organiser manage who has paid before purchasing?
      - What happens if not enough people join (organiser is stuck with full quantity)?
      - Should the app handle payment, or explicitly stay out of it?

  EXPANDED_COMMUNITY_SCOPE:
    name: Expand Beyond Pilot Community
    priority: medium
    phase: v2
    description: Open beyond the initial pilot to a broader neighborhood or city
    rationale: |
      Pilot validates the give-away loop. Expansion brings network effects that make
      the feature more useful (more listings, more matches, faster claims).
    requirements:
      - Pilot success threshold must be met (5+ completed give-aways)
      - Legal review complete for target jurisdictions
      - Moderation plan in place for larger community
      - Community code model replaced with neighborhood-based verification or address check
    open_questions:
      - What's the right expansion unit? (same building -> same estate -> same postal code -> city)
      - How do we verify neighborhood membership without full identity verification?
      - Should communities be self-organized (any group can create one) or geography-based?

  PARTIAL_QUANTITIES:
    name: Partial Quantity Give-Aways
    priority: low
    phase: v3+
    description: Allow give-away of opened items (partial quantities) with hygiene design
    rationale: |
      The sealed-only rule handles the hygiene and verification problems for MVP.
      Partial quantities (e.g., 600g of tamarind paste) are the most common real-world
      give-away scenario — but require solving: container hygiene, quantity verification,
      and receiver trust in item condition.
    requirements:
      - Hygiene guidelines for transferring partial quantities (suitable containers, sealing)
      - Photo of opened item + quantity estimate required
      - Stronger disclaimer for opened items
      - Legal review of liability for opened item transfers
    open_questions:
      - How does the giver communicate quantity accurately without weighing?
      - Should opened items have a shorter auto-expiry window?
      - Is there a meaningful category distinction (liquid vs. dry vs. paste) for guidance?

  REPUTATION_SYSTEM:
    name: Reputation and Trust Scores
    priority: low
    phase: v2 (after expansion)
    description: Build trust signals for users beyond the pilot community
    rationale: |
      Within the pilot, neighbors know each other — reputation is social, not algorithmic.
      When expanding to strangers, reputation scores become necessary trust infrastructure.
    features:
      - Simple "successful give-aways" count per user (not star ratings)
      - "Verified community member" badge after X completed give-aways
      - No written reviews in v2 (too much moderation overhead)
    open_questions:
      - Should reputation be give-away count, or something more nuanced?
      - How do we prevent gaming (fake give-aways to inflate score)?
      - Should low-reputation users have listing restrictions?
