# Recommend Recipe: Decisions
# Status: pending (to be locked), locked, shipped

RECIPE-001:
  title: Recipe source
  status: locked
  decision: |
    Phase 1: Rasamalaysia + 1-2 additional SE Asian sources, manually curated.
    Minimum 100 recipes before launch — if Rasamalaysia alone is under 100, supplement immediately.
    Scope stated explicitly in UI: "Malaysian and Southeast Asian recipes to start."
  rationale: |
    Single-source dependency (Rasamalaysia only) creates two risks:
    (1) If their site structure changes, parsing breaks overnight with no fallback.
    (2) Coverage is geographically narrow — users with non-SE Asian pantries see nothing.
    Starting with 2-3 curated sources hedges the first risk. Being honest about scope in the UI
    manages the second: users know what to expect and aren't disappointed.
  mitigations:
    - Verify recipe count and parseability from each source before committing
    - Store recipes in a stable internal database — not scraped live on each request
    - Legal: reach out to Rasamalaysia for permission/partnership before scraping at scale;
      if no response, assess legal risk before shipping (see legal-compliance docs)
    - Have a manual curation fallback if scraping breaks: 100 recipes can be manually maintained
  phase_2_sources:
    - Chinese (Cantonese/Sichuan): Woks of Life
    - Japanese: Just One Cookbook
    - Korean: Maangchi
    - Vietnamese/Thai: closer to SE Asian, easier to add

RECIPE-002:
  title: Ingredient matching
  status: locked
  decision: |
    Curated synonym/hierarchy matching, not pure fuzzy string matching.
    Maintain a small ingredient synonym map for the most common cases.
    Fall back to literal matching for unrecognised ingredients.
  rationale: |
    Pure exact matching is too rigid: "oil" doesn't match "vegetable oil", "dark soy sauce"
    doesn't match "soy sauce". Users get no results for things they clearly have.
    Pure fuzzy string matching is too loose: "chicken breast" matches "chicken liver",
    "fish sauce" matches "oyster sauce" — garbage recommendations erode trust fast.
    A curated synonym map (e.g., "soy sauce" = ["light soy sauce", "dark soy sauce", "soy sauce"])
    gives controlled flexibility without the unpredictability of fuzzy matching.
    The map starts small (~50 entries for common Asian pantry synonyms) and grows from usage data.
  mitigations:
    - Synonym map is manually maintained and version-controlled
    - Unrecognised ingredients fall back to literal match (conservative, not wrong)
    - Users can see exactly which ingredients matched (shown in recipe detail) — transparency builds trust
    - Monitor zero-result searches: if an ingredient frequently returns nothing, add it to the synonym map

RECIPE-003:
  title: When results update
  status: locked
  decision: Results update after user confirms ingredient selection — not keystroke-by-keystroke
  rationale: |
    True real-time (updating as user types) creates two problems:
    (1) Partial inputs ("chick" before "chicken") trigger irrelevant results mid-type
    (2) With 40 pantry items loaded, the first result set appears before the user has deselected
        anything — they're reacting to results before they've finished setting up their query.
    Better: user loads pantry (or finishes adding manual ingredients), then taps "Find recipes".
    This is one extra tap but results reflect intent, not a half-formed query.
    For pantry-first flow: results appear immediately after the pantry loads (no extra tap needed —
    the "Use my pantry" tap is the trigger).
  mitigations:
    - Pantry flow: results load automatically after pantry items appear as chips
    - Manual flow: "Find recipes" button activates after at least one ingredient is added
    - Deselecting a chip or adding a manual ingredient shows a "Refresh results" button (not auto-update)
      to avoid constant re-ranking as user edits

RECIPE-004:
  title: Recipe data pipeline
  status: locked
  decision: |
    Recipes stored in internal database (not live-scraped on request).
    Refresh pipeline runs periodically (weekly) to catch source changes.
    Manual curation is the fallback and the starting point for MVP.
  rationale: |
    Live scraping on user request is fragile and slow. If the source site is down or changes
    structure, every user request fails. Storing recipes internally decouples the user experience
    from source availability.
    For MVP with ~100 recipes: manual curation is entirely feasible and removes scraping complexity.
    Build the scraping pipeline only when the corpus needs to scale beyond what's manually maintainable.
  mitigations:
    - Recipe schema: name, source name, source URL, cuisine tag, ingredient list, cook time, difficulty
    - Source URL stored per recipe — "View full recipe" always links to original (copyright compliance)
    - Recipe instructions are NOT stored — only metadata and ingredient list
    - Weekly refresh check: detect if source URL returns 404 or ingredient count changes significantly
    - If source URL breaks: mark recipe as "source unavailable", still searchable but with a warning

RECIPE-INTEGRATION:
  title: Integration with Manage Perishables
  status: locked
  decision: |
    Manage Perishables inventory is the PRIMARY ingredient source for recipe search — not an integration.
    "Use my pantry" is the main CTA on the recipe search screen.
    Manual ingredient entry is the fallback for users without a logged inventory.
  rationale: |
    The original design had manual ingredient entry as primary, with manage-perishables as a future
    integration. This is backwards: users who have already logged their pantry should not have to
    type ingredients again. Double-entry is the single biggest friction point.
    Making inventory the primary source also reinforces the value of logging items in the first place
    — it creates a reason to keep the pantry up to date.
  mitigations:
    - If inventory is empty or all items are expired: show manual entry immediately with a helpful note
    - Expiry-aware: only non-expired items surface as chips by default (expired items excluded automatically)
    - User can override: manually add ingredients not in their pantry (e.g., things they just bought)
    - "Cook this tonight" auto-suggestion (expiring items -> recipe) is opt-in only, not automatic
