# Future Features (v2+)

future_features:
  MULTI_SOURCE_EXPANSION:
    name: Multi-Source Recipe Expansion
    priority: high
    phase: v2
    description: Expand recipe corpus beyond SE Asian sources to cover the full Asian pantry spectrum
    rationale: |
      Phase 1 (SE Asian only) will return no results for users with Japanese, Korean, or Chinese pantries.
      Expanding to these cuisines significantly broadens usefulness without changing the core interaction.
    sources_priority:
      - Chinese (Cantonese/Sichuan): Woks of Life
      - Japanese: Just One Cookbook
      - Korean: Maangchi
      - Vietnamese/Thai: closer to SE Asian base, lower lift
    requirements:
      - Each new source requires legal/attribution arrangement before adding
      - Cuisine tag added to each recipe to enable filtering by cuisine (v2 feature)
      - Ingredient synonym map expanded to cover new cuisine's pantry vocabulary
    open_questions:
      - Which cuisine to add first? (Chinese likely largest SE Asian diaspora overlap)
      - Should users be able to filter by cuisine in results?

  STRUCTURED_FEEDBACK_IMPROVEMENT:
    name: Improve Recommendations from Feedback
    priority: high
    phase: v2
    description: Use structured feedback (made / not-for-me + reason) to improve result ranking
    rationale: |
      Binary like/dislike gives no signal on why a recipe was skipped. Structured reasons
      (too complex / missing ingredient / not my taste) let the system learn meaningfully.
      v2: use feedback to personalise ranking (surface "made this" recipes' cuisine/complexity
      profile more; surface "not my taste" less).
    requirements:
      - Minimum feedback volume threshold before personalisation kicks in (avoids cold-start noise)
      - Feedback attributed to session/user without requiring an account (local storage)
      - Skip reason "missing key ingredient" cross-references against actual pantry gap — useful signal
    open_questions:
      - How much feedback is needed before personalisation improves results meaningfully?
      - Should "made this" recipes be saveable/bookmarkable?

  RECIPE_SAVING:
    name: Recipe Saving and History
    priority: medium
    phase: v2
    description: Save recipes you liked or made, and see your cooking history
    features:
      - Bookmark recipes for later reference
      - "Made this" history — recipes you've cooked, with date
      - "Cook again" shortcut from history
    open_questions:
      - Should saved recipes be available offline?
      - Should saves sync across devices (requires accounts)?

  CUISINE_FILTERING:
    name: Cuisine and Dietary Filtering
    priority: medium
    phase: v2
    description: Filter results by cuisine or dietary requirement
    rationale: Only meaningful once multi-source expansion adds enough recipes per cuisine to filter usefully.
    features:
      - Filter by cuisine (Malaysian, Chinese, Japanese, Korean, Vietnamese, Thai)
      - Filter by dietary (vegetarian, vegan, no pork, no shellfish)
    open_questions:
      - Should dietary filters be set as preferences (persistent) or per-search toggles?
      - How do we handle recipes with optional non-vegetarian components?

  INGREDIENT_SUBSTITUTION:
    name: Ingredient Substitution Suggestions
    priority: medium
    phase: v2
    description: When a recipe requires an ingredient the user doesn't have, suggest a viable substitute
    rationale: |
      "Missing: galangal" is useful information. "Missing: galangal — ginger works as a substitute"
      is more useful. This converts "I can't make this" into "I can almost make this."
    features:
      - Per-ingredient substitution note in recipe detail (e.g., "galangal -> fresh ginger (different but works)")
      - Substitution notes are manually curated, not AI-generated
    open_questions:
      - How authoritative should substitution suggestions be? (light note vs. strong recommendation)
      - Should substitutions affect match % calculation?

  EXPIRING_ITEM_SUGGESTIONS:
    name: Cook This Tonight (Expiry-Driven Suggestions)
    priority: medium
    phase: v2
    description: Proactively suggest recipes when items are about to expire
    rationale: |
      The natural connection between manage-perishables and recommend-recipe.
      "You have bok choy expiring in 2 days — here are 3 recipes that use it."
    requirements:
      - Opt-in only — not automatic push notifications
      - Only triggered when recipe corpus is large enough to reliably return results
        for expiring items (otherwise the feature feels broken)
      - Surfaces from expiry notification or as a banner in manage-perishables dashboard
    open_questions:
      - Should this appear in manage-perishables or recommend-recipe (or both)?
      - Trigger threshold: how many expiring items before suggesting?

  REVIEWS_COMMUNITY:
    name: Reviews and Community
    priority: low
    phase: v3+
    description: Allow users to share photos and notes about recipes they've cooked
    rationale: |
      Community trust is valuable but requires: user accounts, content moderation, privacy controls,
      food safety disclaimers, and significant ongoing maintenance. Not appropriate until the core
      recipe recommendation experience is well-established.
    deferred_because:
      - Product category shift (personal tool -> social platform)
      - Requires moderation infrastructure
      - Legal/liability implications if shared recipes lead to food safety issues
      - Single-user apps don't benefit from community features
    open_questions:
      - When is the right time to introduce community? (user count threshold?)
      - Should reviews be on-platform or linked to external sources?

  MEAL_PLANNING:
    name: Meal Planning
    priority: low
    phase: v3+
    description: Plan weekly meals from saved recipes and generate shopping lists
    rationale: |
      Valuable but a significant scope expansion — effectively a different product mode.
      Build after recipe saving, feedback improvement, and cuisine expansion are stable.
    features:
      - Save recipes to a weekly plan
      - Consolidated ingredient list across planned recipes
      - Cross-reference against pantry (what do I already have vs. need to buy?)
    open_questions:
      - Should meal planning integrate with grocery pricing data?
      - How should we handle recipes with shared ingredients in the shopping list?
